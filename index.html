<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Untha — Sun. Skin. Her.</title>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Outfit:wght@200;300;400;500&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
:root{--ink:#0e0c0a;--paper:#faf7f2;--gold:#c8a96e;--gold2:#e8cc90;--sand:#f2ead8;--ease:cubic-bezier(0.16,1,0.3,1);}
body{font-family:'Outfit',sans-serif;background:var(--ink);color:var(--paper);overflow-x:hidden;cursor:none;}

#cur{position:fixed;z-index:99999;width:10px;height:10px;background:var(--gold);pointer-events:none;transform:translate(-50%,-50%);transition:width .35s var(--ease),height .35s var(--ease);mix-blend-mode:difference;}
#cur.big{width:50px;height:50px;opacity:.3;}
#cur2{position:fixed;z-index:99998;width:34px;height:34px;border:1px solid rgba(200,169,110,.3);pointer-events:none;transform:translate(-50%,-50%);transition:left .1s ease,top .1s ease;}

#loader{position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;-webkit-transform:translateZ(0);transform:translateZ(0);will-change:opacity;}
#loader.gone{animation:loaderOut .9s var(--ease) forwards;}
@keyframes loaderOut{to{opacity:0;visibility:hidden;pointer-events:none;transform:scale(1.04);}}}
.l-logo{font-family:'Italiana',serif;font-size:clamp(4rem,12vw,8rem);letter-spacing:.2em;color:transparent;-webkit-text-stroke:1px var(--gold);opacity:0;animation:logoIn 2s var(--ease) .3s forwards;}
@keyframes logoIn{from{opacity:0;letter-spacing:.6em;filter:blur(8px)}to{opacity:1;letter-spacing:.2em;filter:blur(0)}}
.l-line{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:lGrow 2.5s var(--ease) .8s forwards;}
@keyframes lGrow{to{width:220px}}
.l-sub{font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);opacity:0;animation:fadeUp 1s ease 2.2s forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.ticker{position:fixed;top:0;left:0;right:0;z-index:600;background:var(--gold);color:var(--ink);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;padding:7px 0;overflow:hidden;font-weight:500;}
.ticker-track{display:inline-flex;gap:56px;animation:tickScroll 30s linear infinite;white-space:nowrap;}
@keyframes tickScroll{to{transform:translateX(-50%)}}

nav{position:fixed;top:34px;left:0;right:0;z-index:500;padding:16px 48px;display:flex;align-items:center;justify-content:space-between;transition:background .5s,padding .4s;}
nav.scrolled{background:rgba(14,12,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(200,169,110,.1);padding:12px 48px;}
.nav-logo{font-family:'Italiana',serif;font-size:1.9rem;letter-spacing:.12em;color:var(--gold);text-decoration:none;}
.nav-links{display:flex;gap:24px;}
.nav-links a{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(250,247,242,.55);text-decoration:none;transition:color .3s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .4s var(--ease);}
.nav-links a:hover{color:var(--paper);}
.nav-links a:hover::after{width:100%;}
.nav-cta{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);background:var(--gold);border:none;cursor:pointer;padding:10px 22px;border-radius:100px;font-family:'Outfit',sans-serif;transition:background .3s,transform .3s var(--ease);text-decoration:none;display:inline-block;font-weight:500;}
.nav-cta:hover{background:var(--gold2);transform:scale(1.04);}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;}
.hamburger span{display:block;width:22px;height:1.5px;background:var(--paper);transition:.3s;}
@media(max-width:900px){
  nav{padding:14px 24px;}
  .hamburger{display:flex;}
  .nav-links{display:none;position:fixed;top:68px;left:0;right:0;background:rgba(14,12,10,.97);flex-direction:column;padding:28px 24px;gap:20px;backdrop-filter:blur(20px);}
  .nav-links.open{display:flex;}
  .nav-cta{display:none;}
}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:140px 64px 100px;overflow:hidden;}
@media(max-width:768px){.hero{padding:120px 28px 80px;}}
.hero-photo{position:absolute;inset:0;z-index:0;animation:heroZoom 18s ease-in-out infinite alternate;}
.hero-photo img{width:100%;height:100%;object-fit:cover;object-position:center 60%;display:block;}
@keyframes heroZoom{from{transform:scale(1)}to{transform:scale(1.09)}}
.hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(110deg,rgba(14,12,10,.92) 0%,rgba(14,12,10,.72) 38%,rgba(14,12,10,.3) 65%,rgba(14,12,10,.6) 100%),linear-gradient(180deg,rgba(14,12,10,.55) 0%,transparent 30%,rgba(14,12,10,.8) 100%);}
.hero-light{position:absolute;top:-140px;right:-140px;z-index:2;width:800px;height:800px;background:radial-gradient(circle,rgba(200,169,110,.22) 0%,transparent 65%);animation:lightPulse 9s ease-in-out infinite;pointer-events:none;}
@keyframes lightPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.14)}}
.hero-glow{position:absolute;bottom:-80px;left:50%;transform:translateX(-50%);z-index:2;width:1000px;height:300px;background:radial-gradient(ellipse,rgba(200,169,110,.14) 0%,transparent 70%);pointer-events:none;animation:glowPulse 6s ease-in-out infinite alternate;}
@keyframes glowPulse{from{opacity:.4}to{opacity:1}}
.hero-particles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.h-par{position:absolute;animation:hpFloat linear infinite;opacity:0;}
@keyframes hpFloat{0%{opacity:0;transform:translateY(100vh) scale(0);}10%{opacity:.7;}85%{opacity:.2;}100%{opacity:0;transform:translateY(-10vh) scale(.3);}}
.hero-content{position:relative;z-index:3;max-width:700px;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:24px;opacity:0;animation:fadeUp .8s var(--ease) 2.4s forwards;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'✦';font-size:.5rem;}
.hero-h1{font-family:'Italiana',serif;font-size:clamp(4rem,9vw,8rem);line-height:.95;color:var(--paper);margin-bottom:32px;}
.hero-h1 .w{display:block;opacity:0;transform:translateY(70px);animation:wordUp 1s var(--ease) forwards;}
.w1{animation-delay:2.5s;}.w2{animation-delay:2.72s;color:var(--gold);text-shadow:0 0 80px rgba(200,169,110,.45);}.w3{animation-delay:2.94s;}
@keyframes wordUp{to{opacity:1;transform:translateY(0)}}
.hero-p{font-size:.95rem;line-height:1.9;color:rgba(250,247,242,.6);max-width:440px;margin-bottom:48px;opacity:0;animation:fadeUp .8s var(--ease) 3.2s forwards;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;opacity:0;animation:fadeUp .8s var(--ease) 3.4s forwards;}
.hero-scroll{position:absolute;bottom:40px;left:64px;z-index:3;display:flex;align-items:center;gap:12px;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,247,242,.3);opacity:0;animation:fadeUp .8s ease 4s forwards;}
.scroll-bar{width:40px;height:1px;background:rgba(200,169,110,.4);position:relative;overflow:hidden;}
.scroll-bar::after{content:'';position:absolute;inset:0;background:var(--gold);animation:scrollAnim 2s ease-in-out infinite;}
@keyframes scrollAnim{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@media(max-width:768px){.hero-scroll{left:28px;bottom:28px;}}
.hero-badge{position:absolute;right:60px;bottom:100px;z-index:3;background:rgba(14,12,10,.5);backdrop-filter:blur(20px);border:1px solid rgba(200,169,110,.25);border-radius:20px;padding:20px 26px;text-align:center;opacity:0;animation:badgeIn 1s var(--ease) 3.8s forwards,floatBadge 5s ease-in-out 4.8s infinite;}
@keyframes badgeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatBadge{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.hb-num{font-family:'Italiana',serif;font-size:2.6rem;color:var(--gold);line-height:1;}
.hb-lbl{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,247,242,.45);margin-top:4px;}
@media(max-width:768px){.hero-badge{display:none;}}
.hero-ring{position:absolute;right:180px;top:130px;z-index:2;width:110px;height:110px;border:1px solid rgba(200,169,110,.22);display:flex;align-items:center;justify-content:center;font-size:2rem;opacity:0;animation:badgeIn 1s ease 3.6s forwards,spinRing 22s linear 4.6s infinite;}
@keyframes spinRing{to{transform:rotate(360deg)}}
@media(max-width:768px){.hero-ring{display:none;}}

/* BUTTONS */
.btn-gold{background:var(--gold);color:var(--ink);border:none;cursor:pointer;padding:14px 34px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;transition:background .3s,transform .3s var(--ease),box-shadow .3s;text-decoration:none;display:inline-block;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-3px);box-shadow:0 16px 40px rgba(200,169,110,.35);}
.btn-border{background:transparent;color:var(--paper);border:1px solid rgba(250,247,242,.2);border-radius:100px;padding:14px 34px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;transition:border-color .3s,transform .3s var(--ease);text-decoration:none;display:inline-block;}
.btn-border:hover{border-color:var(--gold);transform:translateY(-3px);}
.btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;cursor:pointer;padding:13px 26px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;transition:opacity .3s,transform .3s var(--ease),box-shadow .3s;text-decoration:none;width:100%;box-shadow:0 6px 24px rgba(200,169,110,.28);margin-top:auto;}
.btn-wa:hover{opacity:.85;transform:scale(1.02);box-shadow:0 12px 36px rgba(200,169,110,.45);}
.btn-wa-inline{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;cursor:pointer;padding:13px 30px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;transition:opacity .3s,transform .3s var(--ease);text-decoration:none;}
.btn-wa-inline:hover{opacity:.85;transform:scale(1.02);}

/* MARQUEE */
.marquee-wrap{padding:26px 0;border-top:1px solid rgba(200,169,110,.09);border-bottom:1px solid rgba(200,169,110,.09);overflow:hidden;position:relative;}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;}
.marquee-wrap::before{left:0;background:linear-gradient(90deg,var(--ink),transparent);}
.marquee-wrap::after{right:0;background:linear-gradient(-90deg,var(--ink),transparent);}
.mtrack{display:inline-flex;gap:52px;animation:mscroll 26s linear infinite;}
.mtrack:hover{animation-play-state:paused;}
@keyframes mscroll{to{transform:translateX(-50%)}}
.mitem{display:flex;align-items:center;gap:16px;font-family:'Italiana',serif;font-size:1.5rem;color:rgba(200,169,110,.38);white-space:nowrap;transition:color .3s;}
.mitem:hover{color:var(--gold);}
.mdot{width:5px;height:5px;background:var(--gold);opacity:.4;flex-shrink:0;}

/* SECTION */
.section{padding:100px 60px;max-width:1240px;margin:0 auto;}
@media(max-width:768px){.section{padding:72px 24px;}}
.s-label{font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.s-title{font-family:'Italiana',serif;font-size:clamp(2.4rem,4.5vw,4.2rem);line-height:1.1;color:var(--paper);margin-bottom:56px;}
.s-title em{color:var(--gold);font-style:italic;}

/* COUNTERS */
.counters{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(200,169,110,.08);}
@media(max-width:600px){.counters{grid-template-columns:1fr;}}
.counter-cell{padding:56px 40px;text-align:center;background:var(--ink);transition:background .4s;}
.counter-cell:hover{background:#111008;}
.c-num{font-family:'Italiana',serif;font-size:clamp(2.8rem,5vw,4.5rem);color:var(--gold);line-height:1;}
.c-lbl{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(250,247,242,.3);margin-top:8px;}

/* PRODUCT CARDS */
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}

@media(max-width:900px){.products-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.products-grid{grid-template-columns:1fr 1fr;}}

.p-card{position:relative;overflow:hidden;cursor:pointer;background:var(--ink);-webkit-tap-highlight-color:transparent;}
.p-card-bg{position:absolute;inset:0;transition:transform .9s var(--ease);}
.p-card:hover .p-card-bg{transform:scale(1.06);}
.p-card.oil1 .p-card-bg{background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(160,110,50,.5),transparent 70%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(120,80,30,.35),transparent 70%),linear-gradient(160deg,#1a1005,#2a1a06 40%,#0e0c0a);}
.p-card.oil2 .p-card-bg{background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(212,176,94,.5),transparent 70%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(180,140,60,.3),transparent 70%),linear-gradient(160deg,#1a1408,#2a1e08 40%,#0e0c0a);}
.p-card.after .p-card-bg{background:radial-gradient(ellipse 70% 60% at 30% 30%,rgba(168,210,230,.35),transparent 65%),radial-gradient(ellipse 80% 50% at 70% 80%,rgba(100,160,190,.2),transparent 70%),linear-gradient(140deg,#080e14,#0e1a22 50%,#0e0c0a);}
.p-card.spf .p-card-bg{background:radial-gradient(ellipse 70% 60% at 60% 20%,rgba(232,204,144,.4),transparent 65%),radial-gradient(ellipse 60% 70% at 20% 70%,rgba(200,169,110,.25),transparent 70%),linear-gradient(150deg,#120e04,#1e1808 50%,#0e0c0a);}
.p-particles{position:absolute;inset:0;overflow:hidden;}
.p-par{position:absolute;animation:parFloat linear infinite;opacity:0;}
@keyframes parFloat{0%{opacity:0;transform:translateY(0) scale(0);}20%{opacity:.9;}80%{opacity:.4;}100%{opacity:0;transform:translateY(-130px) scale(1.4);}}
.p-deco{position:absolute;border:1px solid rgba(200,169,110,.12);animation:decoPulse 3s ease-in-out infinite;}
@keyframes decoPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.08);opacity:.25}}
.p-shimmer{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(200,169,110,.07),transparent);transition:left .8s var(--ease);pointer-events:none;}
.p-card:hover .p-shimmer{left:160%;}
.p-card-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:32px 28px;background:linear-gradient(180deg,transparent 35%,rgba(14,12,10,.95) 100%);}
.p-icon{font-size:2.4rem;margin-bottom:10px;transform:translateY(8px) scale(.9);transition:transform .6s var(--ease);filter:drop-shadow(0 0 20px rgba(200,169,110,.5));}
.p-card:hover .p-icon{transform:translateY(-4px) scale(1.1);}
.p-name{font-family:'Italiana',serif;font-size:2rem;color:var(--paper);line-height:1;transform:translateY(6px);transition:transform .5s var(--ease);}
.p-card:hover .p-name{transform:translateY(0);}
/* Arabic subtitle under product name */
.p-arabic{font-size:1rem;color:rgba(200,169,110,.7);margin-top:4px;direction:rtl;font-family:'Outfit',sans-serif;font-weight:300;opacity:0;transform:translateY(6px);transition:opacity .5s var(--ease),transform .5s var(--ease);transition-delay:.05s;}
.p-card:hover .p-arabic{opacity:1;transform:translateY(0);}
.p-type{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(200,169,110,.55);margin-top:5px;transform:translateY(4px);transition:transform .5s var(--ease);font-family:'Outfit',sans-serif;}
.p-card:hover .p-type{transform:translateY(0);}
.p-desc{font-size:.76rem;color:rgba(250,247,242,.45);line-height:1.65;max-height:0;overflow:hidden;transition:max-height .5s var(--ease),margin .3s;}
.p-card:hover .p-desc{max-height:80px;margin-top:8px;}
.p-foot{display:flex;align-items:center;justify-content:space-between;margin-top:18px;}
.p-price{font-size:.88rem;color:var(--gold);letter-spacing:.06em;}
.p-btn{display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;cursor:pointer;padding:10px 20px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;opacity:0;transform:translateX(14px);transition:opacity .4s var(--ease),transform .4s var(--ease),box-shadow .3s;text-decoration:none;}
.p-card:hover .p-btn{opacity:1;transform:translateX(0);}
.p-btn:hover{box-shadow:0 8px 24px rgba(200,169,110,.4);}
/* shimmer tag for shimmery product */
.p-shimmer-tag{position:absolute;top:20px;right:20px;background:linear-gradient(135deg,rgba(200,169,110,.3),rgba(232,204,144,.5));border:1px solid rgba(200,169,110,.4);border-radius:100px;padding:4px 14px;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold2);backdrop-filter:blur(8px);}

/* SKINCARE GRID — 4 products */
.skincare-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;}
@media(max-width:900px){.skincare-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.skincare-grid{grid-template-columns:1fr 1fr;}}














/* BUNDLES */
.bundles-bg{background:var(--sand);}
.bundles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
@media(max-width:900px){.bundles-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}}
.b-card{border:1px solid rgba(14,12,10,.1);border-radius:3px;padding:38px 30px;background:rgba(255,255,255,.55);position:relative;overflow:hidden;transition:transform .5s var(--ease),box-shadow .5s;display:flex;flex-direction:column;}
.b-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#c8a96e,#e8cc90);transform:scaleX(0);transform-origin:left;transition:transform .5s var(--ease);}
.b-card:hover::after{transform:scaleX(1);}
.b-card:hover{transform:translateY(-7px);box-shadow:0 28px 60px rgba(14,12,10,.14);}
.b-card.star{background:var(--ink);color:var(--paper);border-color:transparent;}
.b-tag{display:inline-block;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;padding:4px 14px;border-radius:100px;margin-bottom:22px;font-weight:500;}
.bt-gold{background:linear-gradient(135deg,#c8a96e,#e8cc90);color:var(--ink);}
.b-name{font-family:'Italiana',serif;font-size:1.8rem;margin-bottom:6px;color:var(--ink);}
.b-name.lt{color:var(--paper);}
/* Arabic kit name */


.b-items{font-size:.82rem;line-height:2.1;color:rgba(14,12,10,.5);margin-bottom:22px;min-height:100px;}
.b-items.lt{color:rgba(250,247,242,.45);min-height:100px;}
.b-price{font-family:'Italiana',serif;font-size:2.6rem;color:#8a6d3a;margin-bottom:4px;}
.b-price.lt{color:var(--gold);}
.b-was{font-size:.75rem;color:rgba(14,12,10,.3);text-decoration:line-through;margin-bottom:26px;}
.b-was.lt{color:rgba(250,247,242,.25);}




@media(max-width:768px){}






/* PRODUCT TABS */
.shop-section{padding:0;}
.shop-tabs{display:flex;gap:0;max-width:100%;border-bottom:1px solid rgba(200,169,110,.12);}
.shop-tab{
  flex:1;padding:28px 20px;text-align:center;cursor:pointer;
  font-family:'Italiana',serif;font-size:clamp(1.6rem,3vw,2.4rem);
  color:rgba(250,247,242,.3);
  border-bottom:2px solid transparent;
  transition:color .4s var(--ease),border-color .4s,background .4s;
  position:relative;overflow:hidden;
  background:var(--ink);
  letter-spacing:.05em;
}
.shop-tab::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(200,169,110,.06),transparent);
  opacity:0;transition:opacity .4s;
}
.shop-tab:hover{color:rgba(250,247,242,.6);}
.shop-tab:hover::before{opacity:1;}
.shop-tab.active{
  color:var(--gold);
  border-bottom-color:var(--gold);
  background:rgba(200,169,110,.04);
}
.shop-tab.active::before{opacity:1;}
.shop-tab-sub{
  display:block;font-family:'Outfit',sans-serif;
  font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
  color:inherit;opacity:.5;margin-top:4px;
}
.shop-tab.active .shop-tab-sub{color:var(--gold);opacity:.7;}

/* tab panels */
.shop-panel{display:none;}
.shop-panel.active{display:block;animation:panelIn .6s var(--ease);}
@keyframes panelIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* section header inside panel */
.panel-header{padding:60px 60px 0;max-width:1240px;margin:0 auto;}
@media(max-width:768px){.panel-header{padding:48px 24px 0;}}


/* ── CART BUTTON IN NAV ── */
.cart-btn{
  position:relative;background:none;border:1.5px solid rgba(200,169,110,.35);
  border-radius:100px;padding:9px 18px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  color:var(--paper);font-family:'Outfit',sans-serif;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  transition:border-color .3s,background .3s;
}
.cart-btn:hover{border-color:var(--gold);background:rgba(200,169,110,.08);}
.cart-count{
  position:absolute;top:-7px;right:-7px;
  width:18px;height:18px;
  background:var(--gold);color:var(--ink);
  font-size:.6rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);transition:opacity .3s,transform .3s var(--ease);
}
.cart-count.show{opacity:1;transform:scale(1);}
@keyframes cartJiggle{
  0%,100%{transform:rotate(0)}
  15%{transform:rotate(-14deg) scale(1.1)}
  30%{transform:rotate(12deg) scale(1.1)}
  45%{transform:rotate(-10deg)}
  60%{transform:rotate(8deg)}
  75%{transform:rotate(-5deg)}
}
.cart-btn.jiggle{animation:cartJiggle .6s ease;}

/* ── CART DRAWER ── */
.cart-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(14,12,10,.7);backdrop-filter:blur(8px);
  opacity:0;visibility:hidden;transition:opacity .4s,visibility .4s;
}
.cart-overlay.open{opacity:1;visibility:visible;}
.cart-drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:2001;
  width:min(480px,100vw);
  background:#141210;
  border-left:1px solid rgba(200,169,110,.15);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .5s var(--ease);
}
.cart-drawer.open{transform:translateX(0);}

.cart-head{
  padding:28px 32px;
  border-bottom:1px solid rgba(200,169,110,.1);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.cart-head-title{font-family:'Italiana',serif;font-size:1.9rem;color:var(--paper);}
.cart-close{background:none;border:1px solid rgba(200,169,110,.25);width:38px;height:38px;cursor:pointer;color:var(--paper);font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .3s;}
.cart-close:hover{border-color:var(--gold);transform:rotate(90deg);}

.cart-items{flex:1;overflow-y:auto;padding:24px 32px;}
.cart-items::-webkit-scrollbar{width:4px;}
.cart-items::-webkit-scrollbar-track{background:transparent;}
.cart-items::-webkit-scrollbar-thumb{background:rgba(200,169,110,.3);border-radius:2px;}

.cart-empty{
  height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  text-align:center;
}
.cart-empty-icon{font-size:3rem;opacity:.4;}
.cart-empty-text{font-family:'Italiana',serif;font-size:1.6rem;color:rgba(250,247,242,.4);}
.cart-empty-sub{font-size:.8rem;color:rgba(250,247,242,.25);}

.cart-item{
  display:flex;align-items:center;gap:16px;
  padding:18px 0;border-bottom:1px solid rgba(200,169,110,.08);
  animation:cartItemIn .4s var(--ease);
}
@keyframes cartItemIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.cart-item-icon{width:52px;height:52px;border-radius:10px;background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.15);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-family:'Italiana',serif;font-size:1.05rem;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cart-item-type{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(200,169,110,.55);margin-top:2px;}
.cart-item-price{font-size:.85rem;color:var(--gold);margin-top:4px;}
.cart-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;}
.cart-qty{display:flex;align-items:center;gap:8px;}
.qty-btn{width:26px;height:26px;border:1px solid rgba(200,169,110,.25);background:none;color:var(--paper);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;}
.qty-btn:hover{border-color:var(--gold);background:rgba(200,169,110,.1);}
.qty-val{font-size:.9rem;color:var(--paper);min-width:18px;text-align:center;}
.cart-item-remove{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(250,247,242,.25);background:none;border:none;cursor:pointer;transition:color .2s;}
.cart-item-remove:hover{color:rgba(200,169,110,.6);}

.cart-foot{
  padding:24px 32px;border-top:1px solid rgba(200,169,110,.1);
  flex-shrink:0;background:#141210;
}
.cart-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:20px;}
.cart-total-label{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(250,247,242,.4);}
.cart-total-val{font-family:'Italiana',serif;font-size:2rem;color:var(--gold);}
.cart-checkout-btn{
  width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--ink);border:none;cursor:pointer;
  padding:15px;border-radius:100px;
  font-family:'Outfit',sans-serif;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500;
  transition:opacity .3s,transform .3s var(--ease),box-shadow .3s;
  box-shadow:0 6px 24px rgba(200,169,110,.3);
}
.cart-checkout-btn:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 12px 36px rgba(200,169,110,.45);}
.cart-checkout-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ── CHECKOUT MODAL ── */
.checkout-overlay{
  position:fixed;inset:0;z-index:3000;
  background:rgba(14,12,10,.85);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  opacity:0;visibility:hidden;transition:opacity .4s,visibility .4s;
  overflow-y:auto;
}
.checkout-overlay.open{opacity:1;visibility:visible;}
.checkout-modal{
  background:#141210;border:1px solid rgba(200,169,110,.18);border-radius:6px;
  width:100%;max-width:560px;
  max-height:90vh;overflow-y:auto;
  position:relative;
  animation:modalIn .5s var(--ease);
}
.checkout-modal::-webkit-scrollbar{width:4px;}
.checkout-modal::-webkit-scrollbar-thumb{background:rgba(200,169,110,.3);border-radius:2px;}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(20px)}to{opacity:1;transform:none}}
.checkout-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.checkout-inner{padding:44px 40px;}
@media(max-width:500px){.checkout-inner{padding:32px 22px;}}
.checkout-title{font-family:'Italiana',serif;font-size:2.4rem;color:var(--paper);margin-bottom:6px;}
.checkout-sub{font-size:.82rem;color:rgba(250,247,242,.38);margin-bottom:32px;}
.checkout-close{position:absolute;top:18px;right:18px;background:none;border:1px solid rgba(200,169,110,.2);width:34px;height:34px;cursor:pointer;color:var(--paper);font-size:1rem;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .3s;}
.checkout-close:hover{border-color:var(--gold);transform:rotate(90deg);}

/* order summary in checkout */
.checkout-summary{background:rgba(200,169,110,.04);border:1px solid rgba(200,169,110,.1);border-radius:3px;padding:18px 20px;margin-bottom:28px;}
.checkout-summary-title{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}
.checkout-summary-item{display:flex;justify-content:space-between;font-size:.82rem;color:rgba(250,247,242,.6);padding:5px 0;border-bottom:1px solid rgba(200,169,110,.06);}
.checkout-summary-item:last-child{border-bottom:none;}
.checkout-summary-total{display:flex;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid rgba(200,169,110,.15);}
.checkout-summary-total span:first-child{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(250,247,242,.4);}
.checkout-summary-total span:last-child{font-family:'Italiana',serif;font-size:1.6rem;color:var(--gold);}

.co-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:500px){.co-grid{grid-template-columns:1fr;}}
.co-field{display:flex;flex-direction:column;gap:7px;}
.co-field.full{grid-column:1/-1;}
.co-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.co-input,.co-textarea,.co-select{
  background:rgba(250,247,242,.04);border:1px solid rgba(200,169,110,.18);border-radius:3px;
  padding:12px 15px;color:var(--paper);font-family:'Outfit',sans-serif;font-size:.87rem;
  outline:none;transition:border-color .3s,background .3s;width:100%;
}
.co-input:focus,.co-textarea:focus,.co-select:focus{border-color:var(--gold);background:rgba(200,169,110,.05);}
.co-textarea{resize:vertical;min-height:80px;}
.co-select option{background:#1a1410;color:var(--paper);}
.co-submit{
  margin-top:20px;width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--ink);border:none;cursor:pointer;
  padding:15px;border-radius:100px;
  font-family:'Outfit',sans-serif;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;font-weight:500;
  transition:opacity .3s,transform .3s var(--ease),box-shadow .3s;
  box-shadow:0 6px 24px rgba(200,169,110,.28);
}
.co-submit:hover{opacity:.88;transform:translateY(-2px);box-shadow:0 12px 36px rgba(200,169,110,.4);}
.checkout-success{display:none;text-align:center;padding:40px 20px;}
.checkout-success-icon{font-size:3.5rem;margin-bottom:18px;}
.checkout-success-title{font-family:'Italiana',serif;font-size:2.4rem;color:var(--gold);margin-bottom:10px;}
.checkout-success-sub{font-size:.85rem;color:rgba(250,247,242,.4);line-height:1.8;}

/* ADD TO CART TOAST */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  z-index:4000;
  background:rgba(20,18,16,.95);border:1px solid rgba(200,169,110,.3);
  border-radius:100px;padding:12px 28px;
  display:flex;align-items:center;gap:10px;
  font-size:.8rem;letter-spacing:.06em;color:var(--paper);
  opacity:0;transition:opacity .3s,transform .3s var(--ease);
  pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(14,12,10,.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:8px;height:8px;background:var(--gold);flex-shrink:0;}

/* Add to cart button style on product/skincare cards */
.add-to-cart-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--ink);border:none;cursor:pointer;
  padding:10px 20px;border-radius:100px;
  font-family:'Outfit',sans-serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500;
  opacity:0;transform:translateX(14px);
  transition:opacity .4s var(--ease),transform .4s var(--ease),box-shadow .3s;
  white-space:nowrap;
}
.p-card:hover .add-to-cart-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;opacity:1;transform:translateX(0);}
.add-to-cart-btn:hover{box-shadow:0 8px 24px rgba(200,169,110,.4);}

  0%,40%{transform:translateX(-100%)}

/* ── REVIEWS ── */
.rating-summary{display:flex;align-items:center;gap:48px;padding:36px 40px;border:1px solid rgba(200,169,110,.12);border-radius:4px;background:rgba(255,255,255,.02);margin-bottom:40px;}
@media(max-width:600px){.rating-summary{flex-direction:column;gap:24px;padding:28px 24px;}}
.rating-big{text-align:center;flex-shrink:0;}
.rating-num{font-family:'Italiana',serif;font-size:4rem;color:var(--gold);line-height:1;}
.rating-stars-big{color:var(--gold);font-size:1.1rem;letter-spacing:.08em;margin-top:4px;}
.rating-count{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(250,247,242,.3);margin-top:6px;}
.rating-bars{flex:1;display:flex;flex-direction:column;gap:8px;}
.rbar-row{display:flex;align-items:center;gap:10px;font-size:.72rem;color:rgba(250,247,242,.4);}
.rbar-row span:first-child{width:20px;text-align:right;flex-shrink:0;}
.rbar-row span:last-child{width:28px;flex-shrink:0;}
.rbar{flex:1;height:6px;background:rgba(200,169,110,.1);border-radius:3px;overflow:hidden;}
.rbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;animation:barLoad 1.2s var(--ease) both;}
@keyframes barLoad{from{width:0!important}to{}}

.review-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:36px;}
.rf-btn{background:rgba(250,247,242,.04);border:1px solid rgba(200,169,110,.15);border-radius:100px;padding:8px 20px;color:rgba(250,247,242,.5);font-family:'Outfit',sans-serif;font-size:.72rem;letter-spacing:.1em;cursor:pointer;transition:all .3s;white-space:nowrap;}
.rf-btn:hover{border-color:rgba(200,169,110,.4);color:var(--paper);}
.rf-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:transparent;color:var(--ink);font-weight:500;}

.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin-bottom:48px;}
@media(max-width:900px){.reviews-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.reviews-grid{grid-template-columns:1fr;}}
.r-card{padding:28px 24px;border:1px solid rgba(200,169,110,.1);border-radius:4px;position:relative;transition:border-color .4s,transform .4s var(--ease),box-shadow .4s;background:rgba(255,255,255,.02);}
.r-card::before{content:'"';font-family:'Italiana',serif;font-size:5rem;color:var(--gold);opacity:.09;position:absolute;top:8px;left:14px;line-height:1;pointer-events:none;}
.r-card:hover{border-color:rgba(200,169,110,.3);transform:translateY(-4px);box-shadow:0 16px 40px rgba(200,169,110,.12);}
.r-card.hidden{display:none;}
.r-stars{color:var(--gold);font-size:.85rem;letter-spacing:.08em;margin-bottom:12px;}
.r-text{font-size:.86rem;line-height:1.78;color:rgba(250,247,242,.62);font-style:italic;margin-bottom:16px;}
.r-author{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);}
.r-location{font-size:.58rem;color:rgba(250,247,242,.2);letter-spacing:.08em;margin-top:3px;}

/* WRITE REVIEW SECTION */
.write-review-wrap{border:1px solid rgba(200,169,110,.15);border-radius:4px;overflow:hidden;position:relative;}
.write-review-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.write-review-header{display:flex;align-items:center;justify-content:space-between;padding:28px 36px;gap:16px;flex-wrap:wrap;}
@media(max-width:600px){.write-review-header{padding:22px 22px;}}
.write-review-title{font-family:'Italiana',serif;font-size:2rem;color:var(--paper);}
.write-review-sub{font-size:.78rem;color:rgba(250,247,242,.38);margin-top:4px;}
.write-review-toggle{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--ink);border:none;cursor:pointer;padding:13px 28px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;font-weight:500;transition:transform .3s var(--ease),box-shadow .3s;box-shadow:0 6px 20px rgba(200,169,110,.3);white-space:nowrap;flex-shrink:0;}
.write-review-toggle:hover{transform:scale(1.04);box-shadow:0 10px 30px rgba(200,169,110,.45);}
.write-review-toggle.open{background:rgba(250,247,242,.08);color:var(--paper);border:1px solid rgba(200,169,110,.2);box-shadow:none;}

.review-form-body{padding:0 36px 36px;border-top:1px solid rgba(200,169,110,.08);padding-top:28px;animation:panelIn .4s var(--ease);}
@media(max-width:600px){.review-form-body{padding:22px;}}

.rform-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;}
@media(max-width:560px){.rform-grid{grid-template-columns:1fr;}}
.rform-field{display:flex;flex-direction:column;gap:7px;}
.rform-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.rform-input{background:rgba(250,247,242,.04);border:1px solid rgba(200,169,110,.18);border-radius:3px;padding:12px 15px;color:var(--paper);font-family:'Outfit',sans-serif;font-size:.87rem;outline:none;transition:border-color .3s,background .3s;width:100%;}
.rform-input:focus{border-color:var(--gold);background:rgba(200,169,110,.05);}
.rform-textarea{resize:vertical;min-height:100px;}

.rform-products-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;}

.multi-rate-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:4px;}
.rate-item{border:1px solid rgba(200,169,110,.12);border-radius:3px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;transition:border-color .3s,background .3s;}
.rate-item.rated{border-color:rgba(200,169,110,.35);background:rgba(200,169,110,.05);}
.rate-item-header{display:flex;align-items:center;gap:8px;}
.rate-item-icon{font-size:1.1rem;flex-shrink:0;}
.rate-item-name{font-size:.82rem;color:var(--paper);line-height:1.2;}
.rate-item-type{font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(200,169,110,.45);}
.rate-item-stars{display:flex;gap:3px;flex-direction:row-reverse;justify-content:flex-end;}
.rate-item-stars input{display:none;}
.rate-item-stars label{font-size:1.2rem;color:rgba(200,169,110,.2);cursor:pointer;transition:color .15s,transform .15s;line-height:1;}
.rate-item-stars label:hover,
.rate-item-stars label:hover~label,
.rate-item-stars input:checked~label{color:var(--gold);}

.rform-submit{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:28px;width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--ink);border:none;cursor:pointer;
  padding:18px;border-radius:100px;
  font-family:'Outfit',sans-serif;font-size:.88rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  box-shadow:0 8px 32px rgba(200,169,110,.4);
  transition:transform .3s var(--ease),box-shadow .3s;
  position:relative;overflow:hidden;
}
.rform-submit::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);transform:translateX(-100%);transition:transform .5s;}
.rform-submit:hover::after{transform:translateX(100%);}
.rform-submit:hover{transform:translateY(-3px);box-shadow:0 16px 44px rgba(200,169,110,.55);}
.rform-submit-arrow{font-size:1rem;transition:transform .3s;}
.rform-submit:hover .rform-submit-arrow{transform:scale(1.3);}
.rform-success{text-align:center;padding:36px;animation:panelIn .5s var(--ease);}
.rform-success-icon{font-size:3rem;margin-bottom:12px;}
.rform-success-title{font-family:'Italiana',serif;font-size:2rem;color:var(--gold);margin-bottom:8px;}
.rform-success-sub{font-size:.82rem;color:rgba(250,247,242,.4);line-height:1.8;}


.sk-card{position:relative;overflow:hidden;cursor:pointer;background:var(--ink);}


.sk-card.dc .sk-card-bg{background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(220,180,120,.45),transparent 70%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(190,150,80,.3),transparent 70%),linear-gradient(160deg,#1a1208,#231a08 40%,#0e0c0a);}
.sk-card.nc .sk-card-bg{background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(90,70,140,.5),transparent 70%),radial-gradient(ellipse 60% 80% at 20% 80%,rgba(70,50,120,.3),transparent 70%),linear-gradient(160deg,#0a0810,#120e1c 40%,#0e0c0a);}
.sk-card.ec .sk-card-bg{background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(80,160,140,.4),transparent 70%),radial-gradient(ellipse 60% 80% at 80% 80%,rgba(60,140,120,.25),transparent 70%),linear-gradient(160deg,#060e0c,#0c1612 40%,#0e0c0a);}
.sk-card.sr .sk-card-bg{background:radial-gradient(ellipse 80% 60% at 50% 20%,rgba(170,120,210,.45),transparent 70%),radial-gradient(ellipse 60% 80% at 20% 80%,rgba(140,90,190,.28),transparent 70%),linear-gradient(160deg,#0c0812,#160e1e 40%,#0e0c0a);}
.sk-card-bg{position:absolute;inset:0;transition:transform .9s var(--ease);}
.sk-card:hover .sk-card-bg{transform:scale(1.06);}

/* COUNTERS */
function animC(el){
  const t=parseInt(el.dataset.target),isDec=el.hasAttribute('data-dec'),start=performance.now();
  const run=now=>{const p=Math.min((now-start)/2000,1),ease=1-Math.pow(1-p,4),val=t*ease;
    el.textContent=isDec?(val/10).toFixed(1):Math.floor(val).toLocaleString();if(p<1)requestAnimationFrame(run);};
  requestAnimationFrame(run);
}
const cobs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){animC(e.target);cobs.unobserve(e.target);}});},{threshold:.5});
document.querySelectorAll('.c-num').forEach(el=>cobs.observe(el));

  'coconut-oil':    { name: 'شوفولي، كيف اللّون؟', type: 'Coconut Tanning Oil', price: 15.99, icon: '🥥' },
  'choc-oil':       { name: 'شوفولي، كيف اللّون؟', type: 'Chocolate & Vanilla Oil ✨', price: 15.99, icon: '🍫' },

  'doha':           { name: 'Doha', type: 'Day Cream', price: 24.99, icon: '🌅' },
  'layl':           { name: 'Layl', type: 'Night Cream', price: 24.99, icon: '🌙' },

  'essentials':     { name: '1, 2, 3... يلّا Go!', type: 'Most Popular', price: 49.99, icon: '☀️' },
  'vacation':       { name: 'El Ossa Kella', type: 'Full Bundle', price: 64.99, icon: '🌊' },
};

let cart = {};

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartUI();
  showToast(PRODUCTS[id].name);
  // jiggle cart button
  const btn = document.getElementById('cartBtn');
  btn.classList.remove('jiggle');
  void btn.offsetWidth; // reflow
  btn.classList.add('jiggle');
  btn.addEventListener('animationend', () => btn.classList.remove('jiggle'), {once:true});
}

function removeFromCart(id) {
  delete cart[id];
  updateCartUI();
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id] += delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartUI();
}

function getTotal() {
  return Object.entries(cart).reduce((sum, [id, qty]) => sum + PRODUCTS[id].price * qty, 0);
}

function getTotalItems() {
  return Object.values(cart).reduce((s, q) => s + q, 0);
}

function updateCartUI() {
  const total = getTotalItems();
  const countEl = document.getElementById('cartCount');
  countEl.textContent = total;
  countEl.classList.toggle('show', total > 0);

  const itemsEl = document.getElementById('cartItems');
  const footEl = document.getElementById('cartFoot');
  const emptyEl = document.getElementById('cartEmpty');

  const keys = Object.keys(cart);
  if (keys.length === 0) {
    itemsEl.innerHTML = '';
    itemsEl.appendChild(emptyEl);
    emptyEl.style.display = 'flex';
    footEl.style.display = 'none';
    return;
  }

  emptyEl.style.display = 'none';
  footEl.style.display = 'block';

  // rebuild items
  const existing = itemsEl.querySelectorAll('.cart-item');
  existing.forEach(e => e.remove());

  keys.forEach(id => {
    const p = PRODUCTS[id];
    const qty = cart[id];
    const div = document.createElement('div');
    div.className = 'cart-item';
    div.id = 'cart-item-' + id;
    div.innerHTML = `
      <div class="cart-item-icon">${p.icon}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-type">${p.type}</div>
        <div class="cart-item-price">$${(p.price * qty).toFixed(2)}</div>
      </div>
      <div class="cart-item-right">
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
          <span class="qty-val">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${id}',1)">+</button>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart('${id}')">Remove</button>
      </div>
    `;
    itemsEl.appendChild(div);
  });

  document.getElementById('cartTotal').textContent = '$' + getTotal().toFixed(2);
}

function openCart() {
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function openCheckout() {
  if (getTotalItems() === 0) return;
  closeCart();
  // build summary
  const summaryEl = document.getElementById('checkoutSummaryItems');
  summaryEl.innerHTML = '';
  Object.entries(cart).forEach(([id, qty]) => {
    const p = PRODUCTS[id];
    const row = document.createElement('div');
    row.className = 'checkout-summary-item';
    row.innerHTML = `<span>${p.icon} ${p.name} × ${qty}</span><span>$${(p.price * qty).toFixed(2)}</span>`;
    summaryEl.appendChild(row);
  });
  document.getElementById('checkoutSummaryTotal').textContent = '$' + getTotal().toFixed(2);
  document.getElementById('checkoutForm').style.display = 'block';
  document.getElementById('checkoutSuccess').style.display = 'none';
  document.getElementById('checkoutOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCheckout() {
  document.getElementById('checkoutOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function placeOrder() {
  const name = document.getElementById('coName').value.trim();
  const phone = document.getElementById('coPhone').value.trim();
  const address = document.getElementById('coAddress').value.trim();
  const notes = document.getElementById('coNotes').value.trim();
  if (!name || !phone || !address) { alert('Please fill in your name, phone, and address.'); return; }

  let orderLines = Object.entries(cart).map(([id, qty]) => {
    const p = PRODUCTS[id];
    return `  • ${p.icon} ${p.name} (${p.type}) × ${qty} — $${(p.price * qty).toFixed(2)}`;
  }).join('\n');

  const msg = `Hi! I'd like to place an order from Untha ✦\n\n👤 Name: ${name}\n📞 Phone: ${phone}\n📍 Address: ${address}${notes ? '\n📝 Notes: ' + notes : ''}\n\n🛍️ Order:\n${orderLines}\n\n💰 Total: $${getTotal().toFixed(2)}`;

  window.open('https://wa.me/96181787471?text=' + encodeURIComponent(msg), '_blank');
  cart = {};
  updateCartUI();
  document.getElementById('checkoutForm').style.display = 'none';
  document.getElementById('checkoutSuccess').style.display = 'block';
  setTimeout(closeCheckout, 4000);
}

let toastTimer;
function showToast(name) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = name + ' added to cart';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// close checkout on overlay click
document.getElementById('checkoutOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeCheckout();
});



/* REVIEW FILTER */
function filterReviews(filter) {
  document.querySelectorAll('.rf-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('.r-card').forEach(card => {
    if (filter === 'all') { card.classList.remove('hidden'); return; }
    if (filter === '5' || filter === '4') {
      card.classList.toggle('hidden', card.dataset.stars !== filter);
    } else {
      card.classList.toggle('hidden', card.dataset.cat !== filter);
    }
  });
}

/* TOGGLE REVIEW FORM */
function toggleReviewForm() {
  const body = document.getElementById('reviewFormBody');
  const btn  = document.getElementById('reviewToggle');
  const success = document.getElementById('reviewSuccess');
  success.style.display = 'none';
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  btn.textContent = isOpen ? '+ Write a Review' : '✕ Close';
  btn.classList.toggle('open', !isOpen);
  if (!isOpen) body.scrollIntoView({behavior:'smooth', block:'nearest'});
}

/* MULTI PRODUCT RATING INIT */
const RATE_PRODUCTS = [
  {id:'coconut-oil', name:'Coconut Oil',    type:'Tanning · Non-Shimmery', icon:'🥥', cat:'tanning'},
  {id:'choc-oil',    name:'Choc & Vanilla', type:'Tanning · Shimmery',     icon:'🍫', cat:'tanning'},
  {id:'aftersun',    name:'Aftersun',       type:'Sun Care',                icon:'❄️', cat:'tanning'},
  {id:'sunscreen',   name:'Sunscreen',      type:'Sun Care',                icon:'☀️', cat:'tanning'},
  {id:'doha',        name:'Doha',           type:'Day Cream',               icon:'🌅', cat:'skincare'},
  {id:'layl',        name:'Layl',           type:'Night Cream',             icon:'🌙', cat:'skincare'},
  {id:'oyoun',       name:"O'youn",         type:'Eye Cream',               icon:'👁️', cat:'skincare'},
  {id:'lulu',        name:"LU'LU'",        type:'Face Serum',              icon:'💧', cat:'skincare'},
];

function buildRateGrid() {
  const grid = document.getElementById('multiRateGrid');
  if (!grid) return;
  grid.innerHTML = '';
  RATE_PRODUCTS.forEach(p => {
    const div = document.createElement('div');
    div.className = 'rate-item';
    div.id = 'rate-item-' + p.id;
    div.innerHTML = `
      <div class="rate-item-header">
        <span class="rate-item-icon">${p.icon}</span>
        <div>
          <div class="rate-item-name">${p.name}</div>
          <div class="rate-item-type">${p.type}</div>
        </div>
      </div>
      <div class="rate-item-stars">
        <input type="radio" name="star-${p.id}" id="s5-${p.id}" value="5"/><label for="s5-${p.id}">★</label>
        <input type="radio" name="star-${p.id}" id="s4-${p.id}" value="4"/><label for="s4-${p.id}">★</label>
        <input type="radio" name="star-${p.id}" id="s3-${p.id}" value="3"/><label for="s3-${p.id}">★</label>
        <input type="radio" name="star-${p.id}" id="s2-${p.id}" value="2"/><label for="s2-${p.id}">★</label>
        <input type="radio" name="star-${p.id}" id="s1-${p.id}" value="1"/><label for="s1-${p.id}">★</label>
      </div>
    `;
    grid.appendChild(div);
    div.querySelectorAll('input[type=radio]').forEach(inp => {
      inp.addEventListener('change', () => div.classList.add('rated'));
    });
  });
}
document.addEventListener('DOMContentLoaded', buildRateGrid);
setTimeout(buildRateGrid, 600);

function submitReview() {
  const name = document.getElementById('rName').value.trim();
  const text = document.getElementById('rText').value.trim();
  const loc  = document.getElementById('rLocation').value.trim();
  if (!name || !text) { alert('Please fill in your name and review.'); return; }

  const ratings = [];
  RATE_PRODUCTS.forEach(p => {
    const checked = document.querySelector(`input[name="star-${p.id}"]:checked`);
    if (checked) ratings.push({ p, stars: parseInt(checked.value) });
  });

  const mainStars = ratings.length > 0
    ? Math.round(ratings.reduce((s,r) => s + r.stars, 0) / ratings.length)
    : 5;
  const starStr = '★'.repeat(mainStars) + '☆'.repeat(5 - mainStars);

  const cat = ratings.length > 0
    ? (ratings.every(r => r.p.cat === 'skincare') ? 'skincare' : 'tanning')
    : 'tanning';

  const card = document.createElement('div');
  card.className = 'r-card';
  card.dataset.stars = String(mainStars);
  card.dataset.cat = cat;
  card.style.animation = 'fadeInCard .6s ease forwards';
  card.innerHTML = `
    <div class="r-stars">${starStr}</div>
    <p class="r-text">"${text}"</p>
    <div class="r-author">— ${name}</div>
    ${loc ? `<div class="r-location">${loc}</div>` : ''}
  `;

  const grid = document.getElementById('reviewsGrid');
  grid.insertBefore(card, grid.firstChild);

  document.getElementById('reviewFormBody').style.display = 'none';
  document.getElementById('reviewSuccess').style.display = 'block';
  document.getElementById('reviewToggle').textContent = '+ Write a Review';
  document.getElementById('reviewToggle').classList.remove('open');
}


/* CARD GLOW FOLLOW MOUSE */
document.querySelectorAll('.p-card, .sk-card').forEach(card => {
  card.addEventListener('mousemove', e => {
    const r = card.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%';
    const y = ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%';
    card.style.setProperty('--mx', x);
    card.style.setProperty('--my', y);
  });
});

/* SMOOTH SCROLL */
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.addEventListener('click',e=>{const t=document.querySelector(a.getAttribute('href'));if(t){e.preventDefault();t.scrollIntoView({behavior:'smooth'});}});
});
